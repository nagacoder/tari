<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e3a5f">
  <title>UTBK Try Out 2026</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Loading Screen -->
    <div id="screen-loading" class="screen active">
      <div class="loading-wrap">
        <div class="loading-icon">🎯</div>
        <h1 class="loading-title">UTBK Try Out</h1>
        <p class="loading-sub">Memuat bank soal...</p>
        <div class="spinner"></div>
        <p id="loading-error" class="loading-error hidden"></p>
      </div>
    </div>

    <!-- Login Screen -->
    <div id="screen-login" class="screen">
      <div class="login-wrap">
        <div class="login-header">
          <div class="app-logo">🎯</div>
          <h1>UTBK Try Out 2026</h1>
          <p>Latihan soal adaptif SNBT</p>
        </div>
        <div class="card login-card">
          <h2>Masuk / Daftar</h2>
          <div class="form-group">
            <label for="user-select">Pilih nama kamu</label>
            <select id="user-select">
              <option value="">-- Pilih pengguna --</option>
              <option value="__new__">+ Tambah nama baru</option>
            </select>
          </div>
          <div class="form-group hidden" id="new-name-group">
            <label for="new-name">Nama baru</label>
            <input type="text" id="new-name" placeholder="Masukkan namamu..." maxlength="50">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="login-date">Tanggal</label>
              <input type="date" id="login-date">
            </div>
            <div class="form-group">
              <label for="login-time">Waktu</label>
              <input type="time" id="login-time">
            </div>
          </div>
          <button id="btn-login" class="btn btn-primary btn-full">Mulai →</button>
        </div>
        <p class="login-version">v1.0 | April 2026</p>
      </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="screen-dashboard" class="screen">
      <header class="top-bar">
        <div>
          <p class="top-bar-label">Halo,</p>
          <h2 id="dashboard-username" class="top-bar-title">—</h2>
        </div>
        <button id="btn-logout" class="btn-icon" title="Ganti pengguna">⇄</button>
      </header>

      <div id="resume-banner" class="banner banner-warn hidden">
        <span>⚠️ Kamu punya misi yang belum selesai!</span>
        <button id="btn-resume" class="btn btn-sm btn-warn">Lanjutkan</button>
      </div>

      <div class="section-title-wrap">
        <h3 class="section-title">10 Misi Belajar</h3>
        <p class="section-sub">Selesaikan misi secara berurutan</p>
      </div>

      <div id="mission-grid" class="mission-grid"></div>

      <div class="section-title-wrap">
        <h3 class="section-title">Riwayat Nilai</h3>
      </div>
      <div id="score-history" class="score-history"></div>
      <div style="height:24px"></div>
    </div>

    <!-- Preview Screen -->
    <div id="screen-preview" class="screen">
      <header class="top-bar">
        <button id="btn-preview-back" class="btn-icon">←</button>
        <h2 class="top-bar-title">Pratinjau Misi</h2>
        <div></div>
      </header>
      <div class="preview-content" id="preview-content"></div>
    </div>

    <!-- Question Screen -->
    <div id="screen-question" class="screen">
      <header class="question-header">
        <div class="question-header-top">
          <span id="q-mission-label" class="q-badge">Misi 1</span>
          <span id="q-tema-label" class="q-badge q-badge-tema">PU</span>
          <span id="q-timer" class="q-timer">00:00</span>
        </div>
        <div class="progress-bar-wrap">
          <div id="progress-bar" class="progress-bar" style="width:0%"></div>
        </div>
        <p id="q-progress-label" class="q-progress-label">Soal 1 dari 21</p>
      </header>

      <div class="question-body" id="question-body">
        <!-- Rendered per question -->
      </div>

      <div class="question-footer">
        <button id="btn-submit" class="btn btn-primary btn-full">Submit Jawaban</button>
        <button id="btn-next" class="btn btn-secondary btn-full hidden">Soal Berikutnya →</button>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="screen-result" class="screen">
      <header class="top-bar">
        <div></div>
        <h2 class="top-bar-title">Hasil Misi</h2>
        <div></div>
      </header>
      <div id="result-content" class="result-content"></div>
    </div>

  </div><!-- #app -->

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
  <script src="config.js"></script>
  <!-- data.js sets window.UTBK_QUESTIONS — used as fallback when fetch is blocked (file:// protocol) -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
